name: ci

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**/*.md', 'docs/**', 'LICENSE', '.gitignore' ]
  workflow_dispatch: {}

# A newer push to the same ref cancels the older, still-running CI — so a burst of commits
# spends minutes only on the last one instead of building every intermediate commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format (our sources only)
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find core cli tests -type f \( -name '*.cpp' -o -name '*.h' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

  host-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build
          python3 -m pip install --upgrade pip
          python3 -m pip install gguf numpy
      - name: Configure & build
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build -j
      - name: Byte-identity gates
        run: cd build && ctest --output-on-failure

  host-windows:
    # Windows minutes bill at 2x. It only compile-checks the Win32 I/O paths, so run it where it
    # matters — PRs (before merge) and release tags — not on every main push (already tested on PR).
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure & build (compile-check the Win32 I/O paths)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBMOE_BUILD_TESTS=OFF
          cmake --build build --config Release -j

  # Cross-compiles the arm64 engine (the native compile gate) and packages the example
  # APK around it, uploading the APK as an artifact — and attaching it to the release on a
  # tag push. Debug-signed: for on-device validation, not Play distribution.
  android-apk:
    # The long job (NDK + cross-compile + gradle). Build it on PRs (catch APK breakage before merge)
    # and on release tags (attach the APK), but not on every main push. Trigger a one-off manually
    # with the Run workflow button (workflow_dispatch) if you need a fresh main APK between releases.
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # only used by the tag-triggered release attach step
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Cross-compile bmoe-cli (arm64)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cmake -S . -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release -DBMOE_BUILD_TESTS=OFF \
            -DGGML_NATIVE=OFF -DGGML_OPENMP=OFF \
            -DGGML_CPU_ARM_ARCH="armv8.2-a+dotprod+i8mm+fp16" \
            -DLLAMA_CURL=OFF
          cmake --build build-android -j
      - name: Stage engine binaries into jniLibs
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          jni=examples/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$jni"
          cp build-android/cli/bmoe-cli "$jni/libbmoe-cli.so"
          find build-android \( -name 'libggml*.so' -o -name 'libllama*.so' \) -exec cp {} "$jni/" \;
          # bmoe-cli links the c++_shared STL; ship its runtime from the NDK sysroot.
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" "$jni/"
          ls -la "$jni"
      - name: Build debug APK (dev flavor — sideloaded, all-files access)
        working-directory: examples/android
        run: ./gradlew assembleDevDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bmoe-example-dev-debug-apk
          path: examples/android/app/build/outputs/apk/dev/debug/app-dev-debug.apk
          if-no-files-found: error
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: examples/android/app/build/outputs/apk/dev/debug/app-dev-debug.apk
